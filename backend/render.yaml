# Render Blueprint — https://render.com/docs/blueprint-spec
# Deploy: connect the repo in the Render dashboard and select this blueprint,
# or run `render blueprint launch` from the repo root.
services:
  - type: web
    name: one8-fitlab-api
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    healthCheckPath: /health
    envVars:
      - key: APP_NAME
        value: one8 FitLab API
      - key: ENVIRONMENT
        value: production
      - key: CORS_ORIGINS
        sync: false # set to your Vercel URL, e.g. https://one8-fitlab.vercel.app
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: SUPABASE_JWT_SECRET
        sync: false
      - key: HF_API_TOKEN
        sync: false
      - key: NVIDIA_API_KEY
        sync: false
      - key: LLM_API_BASE
        sync: false
      - key: LLM_API_KEY
        sync: false
      - key: LLM_MODEL
        sync: false
